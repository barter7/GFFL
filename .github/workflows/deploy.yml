name: Deploy to shinyapps.io

on:
  push:
    branches:
      - main
      - claude/espn-fantasy-dashboard-NcBRU

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-packages-${{ hashFiles('.github/workflows/deploy.yml') }}
          restore-keys: r-packages-

      - name: Install R packages
        run: |
          dir.create(Sys.getenv("R_LIBS_USER"), recursive = TRUE, showWarnings = FALSE)
          pkgs <- c("rsconnect", "shiny", "bslib", "dplyr", "tidyr",
                     "ggplot2", "DT", "plotly", "purrr", "stringr",
                     "scales", "ffscrapr", "nflreadr")
          new_pkgs <- pkgs[!pkgs %in% installed.packages()[,"Package"]]
          if (length(new_pkgs) > 0) install.packages(new_pkgs, repos = "https://cloud.r-project.org")
          cat("All packages ready\n")
        shell: Rscript {0}

      - name: Deploy to shinyapps.io
        env:
          SHINYAPPS_NAME: ${{ secrets.SHINYAPPS_NAME }}
          SHINYAPPS_TOKEN: ${{ secrets.SHINYAPPS_TOKEN }}
          SHINYAPPS_SECRET: ${{ secrets.SHINYAPPS_SECRET }}
        run: |
          rsconnect::setAccountInfo(
            name   = Sys.getenv("SHINYAPPS_NAME"),
            token  = Sys.getenv("SHINYAPPS_TOKEN"),
            secret = Sys.getenv("SHINYAPPS_SECRET")
          )

          # Retry deploy up to 5 times with exponential backoff for 409 conflicts
          deploy_with_retry <- function(max_tries = 5) {
            for (attempt in 1:max_tries) {
              result <- tryCatch({
                rsconnect::deployApp(
                  appDir    = ".",
                  appName   = "gffl-dashboard",
                  appTitle  = "GFFL Archives",
                  appFiles  = c("app.R", "helpers.R",
                                list.files("data", recursive = TRUE, full.names = TRUE),
                                list.files("www", recursive = TRUE, full.names = TRUE)),
                  forceUpdate = TRUE
                )
                "success"
              }, error = function(e) {
                msg <- conditionMessage(e)
                if (grepl("409|in progress|transient", msg, ignore.case = TRUE) && attempt < max_tries) {
                  wait_s <- 30 * attempt
                  cat("Deploy attempt", attempt, "hit transient error. Waiting", wait_s, "seconds...\n")
                  Sys.sleep(wait_s)
                  return(NULL)
                }
                stop(e)
              })
              if (!is.null(result)) return(invisible())
            }
            stop("Deploy failed after ", max_tries, " attempts")
          }
          deploy_with_retry()
        shell: Rscript {0}
