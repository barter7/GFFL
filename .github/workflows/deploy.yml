name: Deploy to shinyapps.io

on:
  push:
    branches:
      - main
      - claude/espn-fantasy-dashboard-NcBRU

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Install R packages
        run: |
          install.packages(c("rsconnect", "shiny", "bslib", "dplyr", "tidyr",
                             "ggplot2", "DT", "plotly", "purrr", "stringr",
                             "scales", "ffscrapr", "nflreadr"),
                           repos = "https://cloud.r-project.org")
        shell: Rscript {0}

      - name: Deploy to shinyapps.io
        env:
          SHINYAPPS_NAME: ${{ secrets.SHINYAPPS_NAME }}
          SHINYAPPS_TOKEN: ${{ secrets.SHINYAPPS_TOKEN }}
          SHINYAPPS_SECRET: ${{ secrets.SHINYAPPS_SECRET }}
        run: |
          rsconnect::setAccountInfo(
            name   = Sys.getenv("SHINYAPPS_NAME"),
            token  = Sys.getenv("SHINYAPPS_TOKEN"),
            secret = Sys.getenv("SHINYAPPS_SECRET")
          )
          rsconnect::deployApp(
            appDir    = ".",
            appName   = "gffl-dashboard",
            appTitle  = "GFFL Historical Dashboard",
            appFiles  = c("app.R", "helpers.R"),
            forceUpdate = TRUE
          )
        shell: Rscript {0}
